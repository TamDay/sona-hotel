<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sona | Lab 07 Contents</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css?family=Cabin:400,500,600,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        :root {
            --primary-color: #dfa974;
            --dark-color: #19191a;
            --bg-color: #f8f9fa;
        }
        body {
            font-family: 'Cabin', sans-serif;
            background: var(--bg-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 650px;
            width: 90%;
            text-align: center;
        }
        .logo {
            margin-bottom: 20px;
        }
        .logo img {
            max-width: 150px;
        }
        h1 {
            color: var(--dark-color);
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
            position: relative;
            padding-bottom: 15px;
        }
        h1::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background-color: var(--primary-color);
        }
        p {
            color: #7f8c8d;
            margin-bottom: 30px;
        }
        .exercise-list {
            list-style: none;
            padding: 0;
            margin: 0 0 30px 0;
            text-align: left;
        }
        .exercise-item {
            background: #fafbfc;
            border: 1px solid #e1e8ed;
            border-radius: 8px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }
        .exercise-item:hover {
            border-color: var(--primary-color);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(223, 169, 116, 0.15);
        }
        .exercise-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            text-decoration: none;
            color: var(--dark-color);
            font-weight: 600;
            font-size: 18px;
        }
        .exercise-link i.icon {
            color: var(--primary-color);
            font-size: 22px;
            margin-right: 15px;
        }
        .exercise-link i.arrow {
            transition: transform 0.3s;
        }
        .exercise-link:hover i.arrow {
            transform: translateX(5px);
            color: var(--primary-color);
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            text-decoration: none;
            color: #7f8c8d;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.3s;
        }
        .back-btn i {
            margin-right: 8px;
        }
        .back-btn:hover {
            color: var(--primary-color);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="../img/logo.png" alt="Sona Hotel Logo">
        </div>
        <h1>Bài Tập Thực Hành Lab 07</h1>
        <p>Chọn bài tập bên dưới để chạy ứng dụng tương ứng.</p>
        
        <ul class="exercise-list">
            <li class="exercise-item">
                <a href="./Vi_du/index.html" class="exercise-link">
                    <span><i class="fas fa-file-invoice-dollar icon"></i>Bài 1: Trang Thanh Toán (Form Validation)</span>
                    <i class="fas fa-chevron-right arrow"></i>
                </a>
            </li>
            <li class="exercise-item">
                <a href="./demo_bai_2/index.html" class="exercise-link">
                    <span><i class="fas fa-shopping-cart icon"></i>Bài 2: Quản Lý Giỏ Hàng (Shopping Cart)</span>
                    <i class="fas fa-chevron-right arrow"></i>
                </a>
            </li>
        </ul>
        
        <a href="../labs.html" class="back-btn"><i class="fas fa-arrow-left"></i> Quay lại danh sách Lab</a>
    </div>
</body>
</html>
